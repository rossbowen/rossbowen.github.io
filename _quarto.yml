project:
  title: Ross Bowen
  type: website
  preview:
    port: 4200
    browser: false
    watch-inputs: true

website:
  site-url: https://rossbowen.github.io
  navbar:
    left:
      - text: Blog
        href: index.qmd
    right:
      - icon: github
        href: https://github.com/rossbowen
      - icon: rss
        href: index.xml

format:
  html:
    theme:
      light: [flatly, styles-light.scss]
      dark:  [darkly, styles-dark.scss]
    css: []
    code-copy: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com" />
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
          <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    monofont: "Fira Code"
    page-navigation: true

knitr:
  opts_chunk:
    collapse: true
    comment: "#>"

execute:
  freeze: auto
